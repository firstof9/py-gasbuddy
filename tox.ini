[tox]
envlist = py313, py314, lint, mypy
skip_missing_interpreters = True

[gh-actions]
python =
  3.13: py313
  3.14: py314

[testenv]
extras = test
commands =
  pytest {posargs}

[testenv:lint]
basepython = python3
deps =
  ruff
commands =
  ruff check .
  ruff format --check .

[testenv:mypy]
basepython = python3
deps =
  mypy
  aiofiles
commands =
  mypy py_gasbuddy
